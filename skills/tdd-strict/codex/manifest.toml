[plugin]
name = "tdd-strict"
version = "1.0.0"
description = "Use when implementing any feature or bugfix, before writing implementation code (TDD strict)"
license = "MIT"
authors = ["SkillHub contributors"]

[triggers]
keywords = ["test", "tdd", "test-driven", "测试驱动"]
file_patterns = ["**/*.test.*", "**/*_test.*", "**/test_*.py"]
always_apply = false

[permissions]
read = true
edit = true
shell = ["npm test", "pytest", "go test", "cargo test", "git", "grep"]

[content]
file = "SKILL.md"
