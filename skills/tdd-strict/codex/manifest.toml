[plugin]
name = "tdd-strict"
version = "1.0.0"
description = "Use when implementing any feature or bugfix, before writing implementation code. Enforces RED-GREEN-REFACTOR."
license = "MIT"
authors = ["Jesse Vincent (upstream)", "SkillHub contributors"]

[triggers]
keywords = ["test", "tdd", "test-driven"]
file_patterns = ["**/*.test.*", "**/*_test.*", "**/test_*.py"]
always_apply = false

[permissions]
read = true
edit = true
shell = ["npm test", "pytest", "go test", "cargo test"]

[content]
# Skill 主体内容在相邻文件 SKILL.md
file = "SKILL.md"
