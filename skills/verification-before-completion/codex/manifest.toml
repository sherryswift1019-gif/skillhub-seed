[plugin]
name = "verification-before-completion"
version = "1.0.0"
description = "Run verification command before claiming completion. Evidence before assertions."
license = "MIT"
authors = ["SkillHub contributors"]

[triggers]
keywords = ["complete", "done", "passing", "fixed", "verify", "完成", "通过", "修好"]
always_apply = false

[permissions]
read = true
edit = false
shell = ["npm test", "pytest", "go test", "cargo test", "git", "grep"]

[content]
file = "SKILL.md"
